<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gerência Grupo BM</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>

        * { box-sizing: border-box; 
        }

        body { 
            font-family: 'Segoe UI', 'Arial', sans-serif;
            background-color: #0a1c40; 
            margin: 0; 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
        }
        
        .mobile-frame { 
            width: 100%; 
            max-width: 400px; 
            background: #fff; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 0 0 20px rgba(0,0,0,0.3); 
            position: relative; 
        }
        
        .border-top, .border-bottom { 
            width: 100%; 
            height: 10px; 
            background: #ffffff; 
        }

        .border-bottom { 
            margin-top: auto;  
        }

        .screen { 
            padding: 30px; 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
        }

        .hidden { 
            display: none !important; 
        }

        input, select { 
            width: 100%; 
            margin: 5px 0; 
            padding: 16px; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
            font-size: 16px; 
        }

        .btn-padrao { 
            width: 100%; 
            margin: 10px 0; 
            padding: 18px; 
            border: none; 
            border-radius: 6px; 
            font-weight: bold; 
            cursor: pointer; 
            color: white; 
            text-align: center; 
            display: block; }

        .header { 
            background: #ffffff; 
            padding: 15px; 
            border-radius: 8px; 
            text-align: center; 
            color: #0a1c40; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
        }

        .item-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px 0; 
            border-bottom: 1px solid #eee; 
            font-size: 18px;  
        }

        .ranking { 
            background: #ffffff; 
            padding: 15px; 
            border-radius: 8px; 
            color: #0a1c40; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
        }


        .ranking h3 { 
            background-color: #0a1c40; 
            color: white; 
            padding: 10px; 
            border-radius: 4px; 
            margin-top: 0; 
            text-align: center; 
            font-size: 16px; 
        }

        .cards { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
        }

        .card { 
            background: white; 
            padding: 15px; 
            border-radius: 8px; 
            text-align: center; 
            border-top: 4px solid #c41212; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
        }

        .card h3 { 
            margin: 0 0 5px; 
            font-size: 11px; 
            text-transform: uppercase; 
            color: #0a1c40; 
        }

        .card p { 
            margin: 0; 
            font-size: 24px; 
            font-weight: bold; 
        }

        .table-painel { 
            background: white; 
            border-radius: 8px; 
            overflow-x: auto; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
        }

        table { 
            width: 100%; 
            border-collapse: collapse; 
            font-size: 14px; 
            text-align: center; 
        
        }

        th { 
            background-color: #0a1c40; 
            color: #ffffff; 
            padding: 14px 8px; 
            font-weight: bold; 
            text-transform: uppercase; 
        }

        td { 
            padding: 12px 8px; 
            border-bottom: 1px solid #ddd; 
        }

        tr:nth-child(even) { 
            background-color: #f9f9f9; 
        }

        h1 { 
            text-align: center; 
            color: #0a1c40; 
        }

        .bm-red { 
            color: #c41212; 
        }

        #resultados-filtro { 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            padding: 10px; 
            max-height: 300px; 
            overflow-y: auto; 
            background: #fff; 
        }

    </style>
</head>
<body>

<div class="mobile-frame">
    <div class="border-top"></div>
    <div id="screen-login" class="screen">
        <h1 style="text-align: center; margin: 20px 0 60px 0;">Acesso Gerente</h1>
        <input type="text" id="matricula" placeholder="Matrícula">
        <input type="password" id="senha" placeholder="Senha">
        <button class="btn-padrao" style="background: #0a1c40;" onclick="validar()">Entrar</button>
    </div>

    <div id="screen-painel" class="screen hidden">
        <div class="header"><h1> Treinamento </h1>
        <h2> GRUPO <span class="bm-red">BM</span></h2></div>
        <div class="ranking">
            <h3> Destaques <span id="mês-atual"></span> </h3>
            <div id="ranking-list"></div>
        </div>
        <div class="cards">
            <div class="card"><h3>Total Acertos</h3><p id="total-acertos" style="color:#2e7d32;">0</p></div>
            <div class="card"><h3>Total Erros</h3><p id="total-erros" style="color:#c41212;">0</p></div>
        </div>
        <div class="table-painel">
            <table>
                <thead><tr><th>Funcionário</th><th>Acertos</th><th>Erros</th></tr></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
        <button class="btn-padrao" style="background: #c41212;" onclick="trocarTela('screen-relatorio')">Ver relatório completo</button>
    </div>

    <div id="screen-relatorio" class="screen hidden">
        <h1>Relatório</h1>
        <div style="background:#f8f9fa; padding:15px; border-radius:8px; display:flex; flex-direction:column; gap: 20px">
            <input type="text" id="filter-name" placeholder="Nome do funcionário" oninput="applyFilters()">
            
            <select id="filter-type" onchange="toggleFilterInput()">
                <option value="mes">Filtrar por Mês</option>
                <option value="data">Filtrar por Data Específica</option>
            </select>

            <select id="filter-mes" onchange="applyFilters()">
                <option value="06-2026">Junho 2026</option>
                <option value="07-2026">Julho 2026</option>
                <option value="08-2026">Agosto 2026</option>
                <option value="09-2026">Setembro 2026</option>
                <option value="10-2026">Outubro 2026</option>
                <option value="11-2026">Novembro 2026</option>
                <option value="12-2026">Dezembro 2026</option>
            </select>

            <input type="date" id="filter-date" class="hidden" onchange="applyFilters()">
            
            <button class="btn-padrao" style="background:#2e7d32;" onclick="exportarPDF()">📄 Baixar Relatório</button>
        </div>
        <div id="resultados-filtro"></div>
        <button class="btn-padrao" style="background: #555; margin-top: auto;" onclick="trocarTela('screen-painel')">Voltar ao Painel</button>
    </div>
    <div class="border-bottom"></div>
</div>

<script>
    let timer;
    window.dadosGlobais = [];

    function getDadosTeste() {
        return [
            {nome: "Thiago", pontuacao: 10, total: 12, index: 0, data_hora: "2026-06-27"},
            {nome: "Igor", pontuacao: 8, total: 10, index: 1, data_hora: "2026-06-27"}
        ];
    }

    function trocarTela(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function toggleFilterInput() {
        const tipo = document.getElementById('filter-type').value;
        document.getElementById('filter-mes').classList.toggle('hidden', tipo !== 'mes');
        document.getElementById('filter-date').classList.toggle('hidden', tipo !== 'data');
        applyFilters();
    }

    function atualizarMesRanking() {
        const meses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
        document.getElementById('mês-atual').innerText = meses[new Date().getMonth()];
    }

    async function validar() {
    const matricula = document.getElementById('matricula').value;
    const senha = document.getElementById('senha').value;

    try {
        // Envia a senha para o servidor verificar contra a lista de gerentes
        const response = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ senha }) // O servidor agora checa isso
        });

        const data = await response.json();

        if (response.ok && data.sucesso) {
            // Se o servidor retornar sucesso, libera o painel
            trocarTela('screen-painel');
            atualizarMesRanking();
            await loadData();
        } else {
            // Se a senha for inválida (401)
            alert("Acesso negado: Senha incorreta.");
        }
    } catch (error) {
        console.error("Erro ao validar:", error);
        alert("Erro de comunicação com o servidor.");
    }
}

    async function loadData() {
        try {
            const res = await fetch('/api/dados-dashboard');
            const data = await res.json();
            window.dadosGlobais = (data && data.length > 0) ? data : getDadosTeste();
        } catch (e) {
            window.dadosGlobais = getDadosTeste();
        }
        renderRanking(window.dadosGlobais);
        renderTabela(window.dadosGlobais);
        applyFilters();
    }

    function applyFilters() {
        const nomeFiltro = document.getElementById('filter-name').value.toLowerCase();
        const tipo = document.getElementById('filter-type').value;
        const valorFiltro = tipo === 'mes' ? document.getElementById('filter-mes').value : document.getElementById('filter-date').value;
        const container = document.getElementById('resultados-filtro');

        const filtrados = window.dadosGlobais.filter(item => {
            const matchNome = item.nome.toLowerCase().includes(nomeFiltro);
            
            let matchData = true;
            if (valorFiltro) {
                if (tipo === 'mes') {
                    // Transforma "2026-06-27" em "06-2026" para comparar com o select
                    const partes = item.data_hora.split('-'); // ["2026", "06", "27"]
                    const mesAno = `${partes[1]}-${partes[0]}`; // "06-2026"
                    matchData = (mesAno === valorFiltro);
                } else {
                    // Comparação direta para data específica (YYYY-MM-DD)
                    matchData = item.data_hora.includes(valorFiltro);
                }
            }
            return matchNome && matchData;
        });

        // Exibição na tela
        container.innerHTML = filtrados.length > 0 ? filtrados.map(item => `
            <div class="item-row" onmousedown="iniciarPressao(${item.index}, '${item.nome}')" onmouseup="cancelarPressao()" ontouchstart="iniciarPressao(${item.index}, '${item.nome}')" ontouchend="cancelarPressao()" style="cursor: pointer; padding: 5px; border-bottom: 1px solid #ddd;">
                <div><strong>${item.nome}</strong></div>
                <div style="color:green;">${item.pontuacao} pontos</div>
            </div>`).join('') : '<p style="text-align:center; padding:10px;">Nenhum registro encontrado.</p>';
    }

    function renderTabela(data) {
        let tA = 0, tE = 0;
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = data.map(item => {
            let e = item.total - item.pontuacao;
            tA += item.pontuacao; tE += e;
            return `<tr><td>${item.nome}</td><td>${item.pontuacao}</td><td>${e}</td></tr>`;
        }).join('');
        document.getElementById('total-acertos').innerText = tA;
        document.getElementById('total-erros').innerText = tE;
    }

    function renderRanking(data) {
        // Define os ícones para as três primeiras posições
        const medalhas = ["🥇", "🥈", "🥉"];
        
        const sorted = [...data].sort((a,b) => b.pontuacao - a.pontuacao);
        
        document.getElementById('ranking-list').innerHTML = sorted.slice(0, 3).map((item, index) => `
            <div class="item-row" onmousedown="iniciarPressao(${item.index}, '${item.nome}')" style="cursor: pointer;">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <span style="font-size: 20px;">${medalhas[index]}</span>
                    <span>${item.nome}</span>
                </div>
                <span style="color:green; font-weight: bold;">${item.pontuacao} pontos</span>
            </div>`).join('');
    }

    function iniciarPressao(i, n) { timer = setTimeout(() => excluirDado(i, n), 3000); }
    function cancelarPressao() { clearTimeout(timer); }

    function excluirDado(i, n) {
        const senha = prompt("Modo Exclusão: Digite a senha para excluir " + n + ":");
        if (senha === "116289") { alert("Excluído!"); loadData(); }
    }

    function exportarPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("Relatório Grupo BM", 10, 20);
        const dados = Array.from(document.querySelectorAll('#resultados-filtro .item-row'));
        dados.forEach((row, i) => doc.text(`${i + 1}. ${row.innerText.replace(/\n/g, ' - ')}`, 10, 40 + (i * 10)));
        doc.save("Relatório.pdf");
    }
</script>
</body>
</html>
