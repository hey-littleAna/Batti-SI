<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gerência Grupo BM</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #e0e0e0; margin: 0; min-height: 100vh; display: flex; justify-content: center; }
        
        .mobile-frame { width: 100%; max-width: 400px; background: #fff; min-height: 100vh; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.3); position: relative; }
        .border-top, .border-bottom { width: 100%; height: 15px; background: #ffffff; }
        .border-bottom { margin-top: auto; }
        
        .screen { padding: 20px; flex: 1; display: flex; flex-direction: column; gap: 15px; }
        .hidden { display: none !important; }

        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; }
        .btn-padrao { width: 100%; padding: 15px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; text-align: center; display: block; }
        
        .header { background: #ffffff; padding: 15px; border-radius: 8px; text-align: center; color: #0a1c40; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; font-size: 14px; }

        .ranking { background: #ffffff; padding: 15px; border-radius: 8px; color: #0a1c40; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .ranking h3 { background-color: #0a1c40; color: white; padding: 10px; border-radius: 4px; margin-top: 0; text-align: center; font-size: 16px; }

        .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { background: white; padding: 15px; border-radius: 8px; text-align: center; border-top: 4px solid #c41212; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card h3 { margin: 0 0 5px; font-size: 11px; text-transform: uppercase; color: #0a1c40; }
        .card p { margin: 0; font-size: 24px; font-weight: bold; }

        .table-painel { background: white; border-radius: 8px; overflow-x: auto; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; font-size: 14px; text-align: center; }
        th { background-color: #0a1c40; color: #ffffff; padding: 14px 8px; font-weight: bold; text-transform: uppercase; }
        td { padding: 12px 8px; border-bottom: 1px solid #ddd; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        
        h1 { text-align: center; color: #0a1c40; }
    </style>
</head>
<body>

<div class="mobile-frame">
    <div class="border-top"></div>

    <div id="screen-login" class="screen">
        <h2 style="text-align: center;">Acesso Gerente</h2>
        <input type="text" id="matricula" placeholder="Matrícula">
        <input type="password" id="senha" placeholder="Senha">
        <button class="btn-padrao" style="background: #0a1c40;" onclick="validar()">Entrar</button>
    </div>

    <div id="screen-painel" class="screen hidden">
        <div class="header"><h1>Painel Gerencial</h1></div>
        <div class="ranking">
            <h3>🏆 Ranking </h3>
            <div id="ranking-list"></div>
        </div>
        <div class="cards">
            <div class="card"><h3>Total Acertos</h3><p id="total-acertos" style="color:#2e7d32;">0</p></div>
            <div class="card"><h3>Total Erros</h3><p id="total-erros" style="color:#c41212;">0</p></div>
        </div>
        <div class="table-painel">
            <table>
                <thead><tr><th>Funcionário</th><th>Acertos</th><th>Erros</th></tr></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
        <button class="btn-padrao" style="background: #c41212;" onclick="trocarTela('screen-relatorio')">Ver relatório completo</button>
    </div>

    <div id="screen-relatorio" class="screen hidden">
        <h1>Relatório</h1>
        <div class="filter-section" style="background:#f8f9fa; padding:15px; border-radius:8px; display:flex; flex-direction:column; gap:10px;">
            <input type="text" id="filter-name" placeholder="Nome do funcionário" oninput="applyFilters()">
            <select id="filter-period" onchange="applyFilters()">
                <option value="">Selecione o período...</option>
                <optgroup label="Semanas">
                    <option value="s1">Semana Atual</option>
                    <option value="s2">Semana Anterior</option>
                </optgroup>
                <optgroup label="Mês">
                    <option value="12-2026">Dezembro 2026</option>
                    <option value="11-2026">Novembro 2026</option>
                    <option value="10-2026">Outubro 2026</option>
                    <option value="09-2026">Setembro 2026</option>
                    <option value="08-2026">Agosto 2026</option>
                    <option value="07-2026">Julho 2026</option>
                    <option value="06-2026">Junho 2026</option>
                    <option value="05-2026">Maio 2026</option>
                    <option value="04-2026">Abril 2026</option>
                    <option value="03-2026">Março 2026</option>
                </optgroup>
            </select>
            <button class="btn-padrao" style="background:#2e7d32;" onclick="exportarPDF()">📄 Baixar Relatório</button>
        </div>
        <div id="resultados-filtro" style="margin-top: 20px;"></div>
        <button class="btn-padrao" style="background: #555; margin-top: auto;" onclick="trocarTela('screen-painel')">Voltar ao Painel</button>
    </div>

    <div class="border-bottom"></div>
</div>

<script>
    let timer;
    window.dadosGlobais = [];

    function trocarTela(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function validar() { trocarTela('screen-painel'); loadData(); }

   async function loadData() {
    try {
        // Tenta buscar do servidor
        const res = await fetch('/api/dados-dashboard');
        const data = await res.json();
        
        // Se o servidor retornar algo, usa, se não, usa o teste
        if (data && data.length > 0) {
            window.dadosGlobais = data;
        } else {
            throw new Error("Sem dados no servidor");
        }
    } catch (e) {
        console.log("Servidor offline ou sem dados, usando dados de teste.");
        // Se falhar ou estiver vazio, usa os dados de teste que você configurou
        window.dadosGlobais = [
            {nome: "Thiago", pontuacao: 10, total: 12, index: 0}, 
            {nome: "Igor", pontuacao: 8, total: 10, index: 1}
        ];
    }
    
    // Agora renderiza tudo usando a variável global
    renderRanking(window.dadosGlobais);
    renderTabela(window.dadosGlobais);
    applyFilters(); // Isso garante que os dados apareçam no relatório
}

    function renderTabela(data) {
        let tA = 0, tE = 0;
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = data.map(item => {
            let e = item.total - item.pontuacao;
            tA += item.pontuacao; tE += e;
            return `<tr><td>${item.nome}</td><td>${item.pontuacao}</td><td>${e}</td></tr>`;
        }).join('');
        document.getElementById('total-acertos').innerText = tA;
        document.getElementById('total-erros').innerText = tE;
    }

    function renderRanking(data) {
        data.sort((a,b) => b.pontuacao - a.pontuacao);
        document.getElementById('ranking-list').innerHTML = data.slice(0, 3).map((item, index) => `
            <div class="item-row" onmousedown="iniciarPressao(${item.index}, '${item.nome}')" onmouseup="cancelarPressao()" ontouchstart="iniciarPressao(${item.index}, '${item.nome}')" ontouchend="cancelarPressao()" style="cursor: pointer;">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <span style="font-weight: bold; color: #2e7d32; min-width: 25px;">${index + 1}º</span>
                    <span style="font-weight: 500;">${item.nome}</span>
                </div>
                <span style="color:green; font-weight:bold;">${item.pontuacao} Acertos</span>
            </div>`).join('');
    }

    function applyFilters() {
    const nomeFiltro = document.getElementById('filter-name').value.toLowerCase();
    const container = document.getElementById('resultados-filtro');
    
    // Verifica se os dados existem
    if (!window.dadosGlobais || window.dadosGlobais.length === 0) {
        container.innerHTML = "<p style='text-align:center;'>Nenhum dado carregado.</p>";
        return;
    }

    const filtrados = window.dadosGlobais.filter(item => 
        item.nome.toLowerCase().includes(nomeFiltro)
    );

    if (filtrados.length === 0) {
        container.innerHTML = "<p style='text-align:center;'>Nenhum funcionário encontrado.</p>";
        return;
    }

    // Renderiza na tela
    container.innerHTML = filtrados.map(item => `
        <div class="item-row" onmousedown="iniciarPressao(${item.index}, '${item.nome}')" 
             onmouseup="cancelarPressao()" ontouchstart="iniciarPressao(${item.index}, '${item.nome}')" 
             ontouchend="cancelarPressao()" style="cursor: pointer; padding: 10px; border-bottom: 1px solid #ddd;">
            <div><strong>${item.nome}</strong></div>
            <div style="color:green;">${item.pontuacao} Acertos</div>
            <div style="color:red;">${item.total - item.pontuacao} Erros</div>
        </div>
    `).join('');
}
    function iniciarPressao(index, nome) { timer = setTimeout(() => excluirDado(index, nome), 3000); }
    function cancelarPressao() { clearTimeout(timer); }

    function excluirDado(index, nome) {
        const senha = prompt("Modo Exclusão: Digite a senha para excluir " + nome + ":");
        if (senha === "116289") {
            alert("Excluído com sucesso!");
            loadData();
        } else { alert("Senha incorreta."); }
    }

    function exportarPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    
    // Título do PDF
    doc.setFontSize(18);
    doc.text("Relatório de Treinamento Grupo BM", 10, 20);
    
    // Pega os dados que estão na tela (filtrados)
    const dados = Array.from(document.querySelectorAll('#resultados-filtro .item-row'));
    
    if (dados.length === 0) {
        alert("Nenhum dado na tela para exportar.");
        return;
    }

    let y = 40;
    doc.setFontSize(12);
    dados.forEach((row, index) => {
        // Pega o texto de dentro de cada div da linha
        const texto = row.innerText.replace(/\n/g, ' - ');
        doc.text(`${index + 1}. ${texto}`, 10, y);
        y += 10;
        
        // Se chegar ao final da página, cria uma nova
        if (y > 280) { doc.addPage(); y = 20; }
    });

    doc.save("Relatório_treinamento.pdf");
}
</script>
</body>
</html>
