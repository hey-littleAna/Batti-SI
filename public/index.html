<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Treinamento Grupo BM</title>
    <style>

        /* Dimensionamnento de caixa: Borda da caixa */
        * { box-sizing: border-box; 
        } 

        body, html { 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            background-color: #0a1c40; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-family: 'Segoe UI', sans-serif; 
        }

       
        .container { 
            background: #ffffff; 
            padding: 45px;            /* Aumenta as margens */
            width: 100%;
            max-width: 400px;        /* Limita a largura máxima */ 
            min-height: 450px;
            height: 100vh;          /* '100vh' é a chave: ocupa 100% da altura da tela */
            display: flex; 
            flex-direction: column;
            justify-content: center;  
            text-align: center; 
            align-items: center; 
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.15);
        }

        
        h1 { color: #0a1c40; margin: 40px 0 1px 0; font-size: 36px; }
        h2 { color: #0a1c40; margin: 0px 0 60px 0; font-size: 29px; }
        .bm-red { color: #c41212; }
        #question-text { 
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 50px;
            text-align: center;
            width: 100%; 
            max-width: 350px;           /* Força a largura */
            word-wrap: break-word;     /* Quebra palavras longas */
            white-space: normal;      /* Garante o comportamento normal do texto */
            padding: 0 10px;         /* Espaço nas laterais */
        }

            

        /* FORMULÁRIO E QUIZ */
        input, button, .option { 
            width: 100%; max-width: 300px;
            padding: 14px; border-radius: 4px; font-size: 18px;
        }   

       

        input { margin: 10px 0; border: 1px solid #ccc; }
        button { 
            background-color: #0a1c40; color: white; 
            border: none; font-weight: bold;  margin: 60px 0 40px 0; cursor: pointer; 
        }
        
        /* 5. QUIZ E BOTÕES DE OPÇÃO */
        #options-container {
            width: 100%;             /* Garante que o container ocupe o espaço disponível */
            display: flex;           /* Flexbox para controlar os botões */
            flex-direction: column;
            padding: 18px 14px;         
        }
        
        .option { 
            background: #ffffff; 
            margin: 10px 0; 
            cursor: pointer; 
            border: 1px solid #ccc; 
            transition: 0.2s;
            word-wrap: break-word;          /* Quebra o texto dentro do botão */
            white-space: normal;             /* Permite que o texto quebre em várias linhas */
            text-align: center;              /* Centraliza o texto */
            min-height: 50px;                /* Garante uma altura mínima para comportar várias linhas */
            display: flex;                   /* Flex ajuda a centralizar verticalmente */
            align-items: center;             /* Centraliza texto verticalmente */    
            justify-content: center;         /* Centraliza texto horizontalmente */
        }

        .footer-treinamento {
         margin-top: auto;      /* Empurra o rodapé para o fim do container */
         padding-top: 20px;     /* Espaço entre as opções e o texto */
         font-size: 14px;
         color: #0a1c40;        /* Cor azul escuro */
         font-weight: bold;
         opacity: 0.6;          /* Um pouco transparente para não tirar a atenção do quiz */
         text-align: center;
       }

       
        .option.correct { background-color: #2e7d32 !important; color: white; }
        .option.wrong { background-color: #c41212 !important; color: white; }
        .disabled { pointer-events: none; }
        .hidden { display: none; }

        

    </style>
</head>
<body>


<!--TELA DE LOGIN ---->
<div class="container" id="login-screen">
    <h1> Treinamento </h1>
    <h2> GRUPO <span class="bm-red">BM</span></h2>
    <input type="text" id="nome-funcionario" placeholder="Nome">
    <input type="password" id="senha" placeholder="Senha">
    <button onclick="fazerLogin()">Entrar</button>
</div>

<!-- TELA DO QUIZ  -->
<div class="container hidden" id="quiz-screen">
    <div id="question-text"></div>
    <div id="options-container"></div>

    
    <!-- Novo rodapé -->
    <div class="footer-treinamento">Treinamento Grupo BM</div>
</div>

<script>
   const LIMITE_DIARIO = 5; 
   const bancoDePerguntas = [
    // --- SAMSUNG BÁSICO ---
    { question: "Qual a principal vantagem de um aparelho Samsung da linha Ultra?", options: ["Melhores câmeras e processamento", "Apenas a cor", "O carregador incluso"], answer: 0 },
    { question: "O que é a tela Gorilla Armor presente nos modelos mais novos da Samsung?", options: ["Vidro mais resistente e menos reflexivo", "Tela de plástico", "Tela que muda de cor"], answer: 0 },
    { question: "Para que serve a Inteligência Artificial (Galaxy AI) nos novos aparelhos?", options: ["Traduzir ligações e editar fotos", "Aumentar o peso do aparelho", "Servir como espelho"], answer: 0 },
    { question: "Qual a diferença do S26 Ultra para um aparelho básico?", options: ["Performance superior e câmeras profissionais", "Ele é mais frágil", "Ele é menor"], answer: 0 },

    // --- IPHONE BÁSICO ---
    { question: "O que é o 'Botão de Controle de Câmera' dos novos iPhones?", options: ["Atalho tátil para fotos e zoom", "Botão de desligar", "Botão de volume"], answer: 0 },
    { question: "Qual a principal diferença entre um iPhone 16 e um iPhone 17 Pro?", options: ["Melhor tela, câmeras e processador no Pro", "O 17 Pro é de plástico", "Não há diferença"], answer: 0 },
    { question: "O que é a conexão USB-C nos novos iPhones?", options: ["Entrada padrão mais rápida e universal", "Entrada exclusiva da Apple", "Não serve para carregar"], answer: 0 },
    { question: "O que é o Ceramic Shield na tela do iPhone?", options: ["Tecnologia de resistência a quedas", "Um tipo de adesivo", "Uma capa de borracha"], answer: 0 },

    // --- ESPECIFICAÇÕES E VENDAS ---
    { question: "O que significa dizer que uma tela tem 120Hz de frequência?", options: ["Movimentos e navegação muito mais fluidos", "A tela esquenta mais", "A tela fica sempre desligada"], answer: 0 },
    { question: "Por que aparelhos com maior armazenamento são melhores para o cliente?", options: ["Mais espaço para fotos, vídeos e apps", "Carregam mais rápido", "São mais leves"], answer: 0 },
    { question: "Qual a vantagem do carregamento rápido (45W) em aparelhos compatíveis?", options: ["Recarrega a bateria em menos tempo", "A bateria dura menos", "Gasta mais energia"], answer: 0 },
    { question: "O que é o Zoom Óptico nas câmeras de aparelhos Premium?", options: ["Aproxima a imagem sem perder qualidade", "Zoom que deixa a foto embaçada", "Apenas para vídeos curtos"], answer: 0 },
    { question: "A prova d'água em aparelhos premium significa que:", options: ["Ele resiste a imersões acidentais", "Ele pode ser usado para mergulhar no mar", "Ele é imune a qualquer líquido"], answer: 0 },
    { question: "Qual o benefício de um processador de última geração (ex: Snapdragon/A-Series)?", options: ["Maior velocidade em jogos e aplicativos", "A bateria dura uma semana", "O aparelho não esquenta nada"], answer: 0 },
    { question: "O que é o carregamento sem fio?", options: ["Carregar o aparelho apenas apoiando na base", "Carregar pelo cabo USB", "Carregar via Bluetooth"], answer: 0 }
];

    let perguntasDoDia = [...bancoDePerguntas].sort(() => Math.random() - 0.5).slice(0, LIMITE_DIARIO);
    let currentQ = 0, score = 0, employeeName = '';

    async function fazerLogin() {
        const nome = document.getElementById('nome-funcionario').value;
        const senha = document.getElementById('senha').value;

        // SENHAS DOS GERENTES (para teste local sem servidor)
        const senhasGerentes = {
        "THIAGO": "116289",
        "UBIRATAN": "072026",
    };
        
        if (!nome) { alert("Por favor, insira seu nome."); return; }

        // MODO TESTE COM SENHA
        if (nome.trim().toLowerCase() === "modo teste" && senha === "111955") {
        employeeName = nome;
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        loadQuestion();
        return;
    } 
    
       // Se digitou "modo teste" mas a senha estiver errada
       if (nome.trim().toLowerCase() === "modo teste" && senha !== "111955") {
        alert("Senha incorreta!");
        return;
    }

    // VALIDAÇÃO DE SENHAS DOS GERENTES
    // Verifica se a senha digitada corresponde a algum dos gerentes
    const isGerente = Object.values(senhasGerentes).includes(senha);

    if (isGerente) {
        employeeName = nome;
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        loadQuestion();
    } else {
        // Se não for gerente, tenta validação no servidor (conforme seu código original)
        try {
            const res = await fetch('/api/login', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ senha })
            });
            
            if(res.ok) {
                employeeName = nome;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('quiz-screen').classList.remove('hidden');
                loadQuestion();
            } else { alert("Senha incorreta!"); }
        } catch (e) { 
            alert("Erro de conexão com o servidor."); 
        }
    }
}


    function loadQuestion() {
        const q = perguntasDoDia[currentQ];
        document.getElementById('question-text').innerText = q.question;
        const cont = document.getElementById('options-container'); 
        cont.innerHTML = '';
        
        // 1. Criamos um array de objetos para rastrear qual é a resposta correta
        let opcoesComIndice = q.options.map((opt, i) => ({
            text: opt,
            isCorrect: i === q.answer
        }));

        // 2. Embaralhamos as opções (Algoritmo de Fisher-Yates)
        opcoesComIndice.sort(() => Math.random() - 0.5);

        // 3. Renderizamos os botões embaralhados
        opcoesComIndice.forEach((opt) => {
            const div = document.createElement('div');
            div.className = 'option'; 
            div.innerText = opt.text;
            div.onclick = () => {
                document.querySelectorAll('.option').forEach(o => o.classList.add('disabled'));
                
                // Agora verificamos pelo atributo 'isCorrect' e não pelo índice fixo
                if(opt.isCorrect) { 
                    div.classList.add('correct'); 
                    score++; 
                } else { 
                    div.classList.add('wrong'); 
                    // Para destacar a correta caso o usuário erre:
                    document.querySelectorAll('.option').forEach(btn => {
                        // Encontra o botão correto pelo texto original da resposta
                        if(btn.innerText === q.options[q.answer]) btn.classList.add('correct');
                    });
                }
                setTimeout(() => { 
                    currentQ++; 
                    currentQ < perguntasDoDia.length ? loadQuestion() : finish(); 
                }, 1000);
            };
            cont.appendChild(div);
        });
    }
   

    async function finish() {
        if (employeeName.trim().toLowerCase() === "modo teste") {
            alert("Treinamento finalizado (Modo Teste - Não enviado).");
            location.reload();
            return;
        }

        try {
            await fetch('/api/resultado', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ 
                    nome: employeeName, 
                    pontuacao: score, 
                    total: perguntasDoDia.length, 
                    data_hora: new Date().toLocaleString('pt-BR') 
                })
            });
            alert("Treinamento concluído e enviado!");
        } catch (e) {
            alert("Erro ao enviar resultado. Verifique a conexão.");
        }
        location.reload();
    }
</script>
</body>
</html>
